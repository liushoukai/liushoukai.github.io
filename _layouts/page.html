---
layout: default
---
<div class="max-w-4xl mx-auto">
  <div class="bg-[#f8f8fd] rounded-xl shadow-card opacity-95 overflow-hidden">
    <!-- 页面头部 -->
    {% if page.title %}
    <header class="bg-gradient-to-r from-tiffany/10 to-transparent px-6 md:px-10 py-8 border-b border-gray-100">
      <h1 class="text-2xl md:text-3xl font-bold text-gray-800 flex items-center gap-3">
        {% if page.icon %}
        <span class="octicon {{ page.icon }} text-tiffany"></span>
        {% endif %}
        {{ page.title }}
      </h1>
    </header>
    {% endif %}

    <!-- 页面内容 -->
    <div class="px-6 md:px-10 py-8">
      <article class="prose prose-gray max-w-none
                      prose-headings:text-gray-800 prose-headings:font-bold
                      prose-p:text-gray-700 prose-p:leading-relaxed
                      prose-a:text-tiffany prose-a:no-underline hover:prose-a:underline
                      prose-img:rounded-lg prose-img:shadow-md">
        {{ content }}
      </article>
    </div>
  </div>
</div>
