---
layout: null
---
<!DOCTYPE html>
<html class="h-full">
<head>
    {% include page-analytics.html %}
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="{{ site.author }}">
    <meta name="keywords" content="{{ site.keywords }}">
    <meta name="description" content="{{ site.description }}">

    <title>{% if page.title.size %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>

    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" media="screen">
    <link rel="canonical" href="{{ page.url | prepend: site.baseurl }}">
    <link rel="alternate" hreflang="zh" href="https://liushoukai.github.io"/>
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | prepend: site.baseurl }}"/>
    {% include page-style.html %}
</head>
<body class="min-h-full flex flex-col">
{% include page-header.html %}

<main class="flex-1 pt-16 pb-8">
    <div class="max-w-6xl mx-auto px-4">
        {{ content }}
    </div>
</main>

{% include page-footer.html %}
{% include page-script.html %}

<!-- 回到顶部按钮 -->
<button id="back-to-top"
    class="fixed bottom-8 right-8 z-50 w-10 h-10 rounded-xl bg-white/90 backdrop-blur shadow-card text-gray-400
           hover:bg-tiffany hover:text-white hover:shadow-lg
           transition-all duration-300 opacity-0 pointer-events-none
           flex items-center justify-center cursor-pointer"
    aria-label="回到顶部"
    onclick="window.scrollTo({ top: 0, behavior: 'smooth' })">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transition-transform duration-300 group-hover:-translate-y-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
    </svg>
</button>
<script>
(function() {
    var btn = document.getElementById('back-to-top');
    if (!btn) return;
    window.addEventListener('scroll', function() {
        if (window.scrollY > 400) {
            btn.style.opacity = '1';
            btn.style.pointerEvents = 'auto';
        } else {
            btn.style.opacity = '0';
            btn.style.pointerEvents = 'none';
        }
    });
})();
</script>
</body>
</html>
